services:
  catalog-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: catalog-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - catalog-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"Your_password123\" -C -Q \"SELECT 1\" -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  catalog-api:
    build:
      context: .
      dockerfile: src/Catalog.Api/Dockerfile
    container_name: catalog-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__CatalogDb: "Server=catalog-db,1433;Database=CatalogDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True"
      # NOT: Tüm servisleri tek compose ile kaldırdığımızda burası "http://identity-api:8080/" olacak.
      Identity__Issuer: "http://host.docker.internal:5001/"
    ports:
      - "5002:8080"
    depends_on:
      catalog-db:
        condition: service_healthy

volumes:
  catalog-db-data:
